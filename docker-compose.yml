services:
  # ============================================
  # EMPÓRIO VIP SYSTEM (seu sistema)
  # ============================================
  emporio:
    build: .
    container_name: emporio-vip
    restart: always
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=file:./data/emporio.db
      - JWT_SECRET=trocar_por_uma_senha_forte_aqui_123
      - PORT=3002
      - FRONTEND_URL=*
      - NODE_ENV=production
    volumes:
      - emporio-data:/app/backend/data
      - emporio-uploads:/app/backend/uploads

  # ============================================
  # EVOLUTION API (WhatsApp)
  # ============================================
  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=trocar_por_uma_chave_secreta_123
    volumes:
      - evolution-data:/evolution/instances

  # ============================================
  # NGINX (proxy reverso - acesso por domínio)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - emporio
      - evolution

volumes:
  emporio-data:
  emporio-uploads:
  evolution-data:
